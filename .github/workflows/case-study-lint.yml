name: case-study-lint

# Runs the canonical-quality case-study linter
# (skylight-hub/plugins/skylight-website-case-study-linter) against
# _projects/*.md. This is the regression gate for the case-study taxonomy
# rationalization: every tags / technologies / practices value must match a
# canonical entry in this repo's _data/{filters,technologies,practices}.yml.
#
# The linter is federation canon and lives in skylight-hub (a PRIVATE repo).
# This public repo can't read it with the default GITHUB_TOKEN, so the gate
# checks out the hub linter using a short-lived token minted from the
# federation GitHub App (Contents:Read, scoped to skylight-hub, ~1h TTL) —
# the org-owned, ephemeral mechanism the whole federation shares. No
# long-lived PAT.
#
#   *** ACTIVATION ***
#   The gate self-activates when the App is configured for this repo: the
#   FEDERATION_APP_CLIENT_ID variable + FEDERATION_APP_PRIVATE_KEY secret, with the
#   App installed on skylight-hq/skylight-hub. Until then the token step is
#   skipped and the gate SKIPS with a warning, so this workflow merges cleanly.

on:
  pull_request:
    paths:
      - '_projects/**'
      - '_data/filters.yml'
      - '_data/technologies.yml'
      - '_data/practices.yml'
      - '.github/workflows/case-study-lint.yml'
  push:
    branches: [master]
    paths:
      - '_projects/**'
      - '_data/filters.yml'
      - '_data/technologies.yml'
      - '_data/practices.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout skylight.digital
        uses: actions/checkout@v4

      # Mint a short-lived token from the federation GitHub App to read the
      # canonical linter out of the private skylight-hub repo. Guarded so the
      # gate self-skips until the App is configured.
      - name: Mint hub-read App token
        id: app-token
        # Skipped on Dependabot PRs (their runs can't read the App private-key
        # secret); continue-on-error covers fork PRs. The gate then self-skips
        # below (cfg.ok=false → "gate inactive" notice), keeping the check green.
        if: ${{ vars.FEDERATION_APP_CLIENT_ID != '' && github.actor != 'dependabot[bot]' }}
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.FEDERATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.FEDERATION_APP_PRIVATE_KEY }}
          owner: skylight-hq
          repositories: skylight-hub

      - name: Detect hub-access token
        id: cfg
        env:
          HUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -n "$HUB_TOKEN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Gate inactive notice
        if: steps.cfg.outputs.ok != 'true'
        run: |
          echo "::warning title=case-study-lint inactive::Federation GitHub App not configured " \
               "(needs the FEDERATION_APP_CLIENT_ID variable + FEDERATION_APP_PRIVATE_KEY secret, with the " \
               "App installed on skylight-hq/skylight-hub). The case-study taxonomy gate is not " \
               "enforcing. Skipping for now (non-blocking)."
          echo "Gate skipped — see warning above."

      - name: Checkout skylight-hub linter (canon)
        if: steps.cfg.outputs.ok == 'true'
        uses: actions/checkout@v4
        with:
          repository: skylight-hq/skylight-hub
          token: ${{ steps.app-token.outputs.token }}
          path: .hub
          sparse-checkout: |
            plugins/skylight-website-case-study-linter
          sparse-checkout-cone-mode: false

      - name: Set up Ruby
        if: steps.cfg.outputs.ok == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Lint all case studies against canonical taxonomy
        if: steps.cfg.outputs.ok == 'true'
        run: |
          set -uo pipefail
          LINTER=".hub/plugins/skylight-website-case-study-linter/skills/website-case-study-linter/scripts/lint_case_study.rb"
          if [ ! -f "$LINTER" ]; then
            echo "::error::Linter not found at $LINTER — hub layout may have changed."
            exit 1
          fi

          failed=0
          shopt -s nullglob
          for f in _projects/*.md; do
            out=$(ruby "$LINTER" "$f" --json 2>/dev/null) || true
            # Count blocking findings via stdlib JSON.
            blocking=$(printf '%s' "$out" | ruby -rjson -e '
              begin
                d = JSON.parse(STDIN.read)
                puts(d["blocking"] || [])
                  .map { |b| b["code"] }
                  .join(",")
              rescue
                puts ""
              end' 2>/dev/null)
            if [ -n "$blocking" ]; then
              echo "FAIL  $f — blocking: $blocking"
              # Print the human-readable messages for the failing file.
              ruby "$LINTER" "$f" 2>/dev/null | grep -E '^BLOCK' || true
              failed=$((failed + 1))
            fi
          done

          echo ""
          if [ "$failed" -gt 0 ]; then
            echo "$failed case study file(s) have blocking findings. See above."
            echo "For taxonomy_invalid: use a canonical value, or add the new value to the"
            echo "relevant _data/ list (filters.yml / technologies.yml / practices.yml) in a PR."
            exit 1
          fi
          echo "All case studies pass the canonical-quality linter."
