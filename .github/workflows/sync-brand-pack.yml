name: sync-brand-pack

# Keeps _data/brand/*.yml in sync with the canonical
# skylight-hub/plugins/skylight-brand-pack/config/*.yml. If contents diverge,
# opens a single PR with the changed files and refreshed sync headers. If
# nothing changed, the run is a no-op.
#
# Mirrors the sync-website-filters.yml pattern in skylight-hub, with the
# direction reversed (this repo fetches FROM hub instead of being fetched BY
# hub).
#
#   *** AUTH ***
#   skylight-hub is PRIVATE. The default GITHUB_TOKEN (scoped to this repo)
#   cannot read it, and unauthenticated raw.githubusercontent fetches 404.
#   So this sync fetches via the GitHub contents API using a short-lived token
#   minted from the federation GitHub App (Contents:Read, scoped to
#   skylight-hub, ~1h TTL) — no long-lived PAT. Until the App is configured
#   (FEDERATION_APP_CLIENT_ID variable + FEDERATION_APP_PRIVATE_KEY secret, App
#   installed on skylight-hq/skylight-hub), the sync SKIPS with a warning
#   (non-blocking) so the workflow stays mergeable and self-activates. The
#   same App config activates the case-study-lint gate.
#
#   NOTE: the companion brand-pack-freshness.yml job fails when a vendored
#   file's synced_at is >30 days old. If this sync stays inactive (no App),
#   the brand files will eventually trip that freshness gate — configuring the
#   App resolves both.

on:
  schedule:
    # Mondays at 14:00 UTC (~10am ET) — brand changes are quarterly at most;
    # weekly polling is overkill but matches the filters-pack cadence for
    # operator-familiarity.
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write  # failure alerting (ops-alert issue)

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SOURCE_REPO: skylight-hq/skylight-hub
      DEST_DIR: _data/brand
      SOURCE_DIR: plugins/skylight-brand-pack/config
      # Refresh a file's sync header even when its body is unchanged once the
      # header is this old — safely under brand-pack-freshness.yml's 30-day
      # gate. Without this, a stable canon deadlocks the freshness check red
      # (root cause of the 2026-07 HUB-A-019 failure). Mirrors the hub's
      # sync-website-filters.yml.
      REFRESH_AGE_DAYS: 21
      # Canon we deliberately do NOT mirror to the public website. One
      # `filename.yml  # reason` per line — an entry with no stated reason is
      # not a decision, it's the silent drift this file just deleted, coming
      # back. Empty today: every brand-pack config file is public-safe, so the
      # website carries all of them.
      #
      # Adding an entry here does NOT remove an already-mirrored file from
      # _data/brand/ — that orphan would then age past brand-pack-freshness's
      # 30-day gate and fail CI with no sync able to refresh it. Delete the
      # mirrored file in the same PR that adds the deny entry.
      DENY_LIST: |
        # (no exclusions)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Mint a short-lived token from the federation GitHub App to read the
      # brand-pack canon out of the private skylight-hub repo. Guarded so the
      # sync self-skips until the App is configured.
      - name: Mint hub-read App token
        id: app-token
        if: ${{ vars.FEDERATION_APP_CLIENT_ID != '' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.FEDERATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.FEDERATION_APP_PRIVATE_KEY }}
          owner: skylight-hq
          repositories: skylight-hub

      # A second, separately-scoped token — this one WRITES, and only to this
      # repo. It exists because a PR authored via the default GITHUB_TOKEN does
      # not trigger workflows (GitHub's loop prevention), so the sync PR would
      # arrive with no `Build the site` check. That check is now a required
      # status check on master, so such a PR is unmergeable without an admin
      # override. An App-authored PR triggers workflows normally and merges on
      # its own merits.
      #
      # continue-on-error + the GITHUB_TOKEN fallback below mean this can only
      # improve on the status quo: if the App lacks write on this repo the mint
      # fails, the sync still opens its PR exactly as it does today, and the
      # step starts working the moment the permission is granted. Mirrors the
      # pr-token pattern in skylight-hub's vendored-content-sync.yml.
      - name: Mint federation App token (PR authoring — write, this repo only)
        id: pr-token
        if: ${{ vars.FEDERATION_APP_CLIENT_ID != '' }}
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.FEDERATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.FEDERATION_APP_PRIVATE_KEY }}
          owner: skylight-hq
          repositories: skylight.digital
          permission-contents: write
          permission-pull-requests: write

      - name: Detect hub-access token
        id: cfg
        env:
          HUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -n "$HUB_TOKEN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync inactive notice
        if: steps.cfg.outputs.ok != 'true'
        run: |
          echo "::warning title=sync-brand-pack inactive::skylight-hub is private; this sync needs the federation GitHub App configured (FEDERATION_APP_CLIENT_ID variable + FEDERATION_APP_PRIVATE_KEY secret, App installed on skylight-hq/skylight-hub) to fetch the brand-pack canon. Skipping (non-blocking) until then. The same App config activates the case-study-lint gate."
          echo "Sync skipped — see warning above."

      - name: Resolve source default branch + SHA
        if: steps.cfg.outputs.ok == 'true'
        id: src
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH=$(gh api repos/${SOURCE_REPO} --jq '.default_branch')
          SHA=$(gh api repos/${SOURCE_REPO}/branches/${BRANCH} --jq '.commit.sha')
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}"       >> "$GITHUB_OUTPUT"
          echo "Source: ${SOURCE_REPO}@${BRANCH} (${SHA})"

      # The hub's config directory IS the list of what to carry, so ask it.
      # This used to be a hard-coded FILES variable — a second copy of that
      # directory listing, maintained by hand, which drifted silently:
      # emoji-vocabulary.yml was canon for ~2 months while this sync mirrored
      # 9 of 10 files and reported success every week. Nothing was red, because
      # a list can't notice what it's missing. Adding a file to the hub config
      # dir must cost zero edits here — that's the constraint this step exists
      # to hold.
      #
      # Listed at the resolved SHA rather than the branch so the listing and
      # the fetches below can't straddle a mid-run push.
      - name: Derive the mirrored file list from hub canon
        if: steps.cfg.outputs.ok == 'true'
        id: files
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          SHA="${{ steps.src.outputs.sha }}"

          # .yml only — the destination is a Jekyll _data dir, so YAML is the
          # contract. A README or subdirectory in the canon dir isn't data.
          if ! gh api "repos/${SOURCE_REPO}/contents/${SOURCE_DIR}?ref=${SHA}" \
                 --jq '.[] | select(.type == "file") | .name | select(endswith(".yml"))' \
                 | sort > /tmp/canon.txt; then
            echo "::error title=sync-brand-pack: canon listing failed::Could not list ${SOURCE_REPO}/${SOURCE_DIR} at ${SHA}. Refusing to continue — an unreadable canon looks exactly like an empty one, and syncing nothing while reporting success is the failure this derivation exists to prevent."
            exit 1
          fi
          if [ ! -s /tmp/canon.txt ]; then
            echo "::error title=sync-brand-pack: canon listing empty::${SOURCE_REPO}/${SOURCE_DIR} at ${SHA} lists no .yml files. Refusing to mirror nothing and call it a clean run."
            exit 1
          fi

          # Deny-list -> bare filenames (drop the `# reason` text and blanks).
          printf '%s\n' "${DENY_LIST}" \
            | sed -E 's/#.*//; s/[[:space:]]//g' \
            | grep -v '^$' \
            | sort > /tmp/deny.txt || true

          # A deny entry naming a file that isn't in canon is the same
          # hand-typed drift wearing a different hat — say so out loud.
          while read -r d; do
            echo "::warning title=sync-brand-pack: stale deny entry::'${d}' is denied but no longer exists in ${SOURCE_DIR} — drop it from DENY_LIST."
          done < <(comm -13 /tmp/canon.txt /tmp/deny.txt)

          comm -23 /tmp/canon.txt /tmp/deny.txt > /tmp/files.txt
          if [ ! -s /tmp/files.txt ]; then
            echo "::error title=sync-brand-pack: everything denied::DENY_LIST excluded every file in canon, leaving nothing to sync. That is a config mistake, not a no-op."
            exit 1
          fi

          echo "Carrying $(wc -l < /tmp/files.txt) of $(wc -l < /tmp/canon.txt) canon file(s):"
          sed 's/^/  /' /tmp/files.txt
          echo "list=$(tr '\n' ' ' < /tmp/files.txt)" >> "$GITHUB_OUTPUT"

      - name: Fetch + rewrite each mirrored file
        if: steps.cfg.outputs.ok == 'true'
        id: fetch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          FILES: ${{ steps.files.outputs.list }}
        run: |
          set -uo pipefail
          BRANCH="${{ steps.src.outputs.branch }}"
          SHA="${{ steps.src.outputs.sha }}"
          SYNCED_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          mkdir -p "$DEST_DIR"
          changed_files=()
          skipped_files=()
          for f in $FILES; do
            # Authenticated fetch via the contents API (works for private repos;
            # `Accept: ...raw` streams the file bytes). Pinned to the resolved SHA.
            echo "Fetching ${SOURCE_DIR}/${f} @ ${SHA}"
            if ! gh api "repos/${SOURCE_REPO}/contents/${SOURCE_DIR}/${f}?ref=${SHA}" \
                   -H "Accept: application/vnd.github.raw" > "/tmp/${f}.body" 2>/tmp/${f}.err; then
              # The list came from the directory at this same SHA, so the file
              # exists by construction — a failure here is the API or the token,
              # not a typo'd name. Skip it, but never quietly (see below).
              echo "  -> not retrievable (API error, or token lacks access); skipping"
              skipped_files+=("$f")
              continue
            fi
            BODY=$(cat "/tmp/${f}.body")
            DEST="${DEST_DIR}/${f}"
            {
              echo "# This file is a mirror of skylight-hub/${SOURCE_DIR}/${f}."
              echo "# Synced via .github/workflows/sync-brand-pack.yml."
              echo "# Do not edit by hand — edits get clobbered on next sync."
              echo "# source_repo: ${SOURCE_REPO}"
              echo "# source_path: ${SOURCE_DIR}/${f}"
              echo "# source_branch: ${BRANCH}"
              echo "# source_sha: ${SHA}"
              echo "# synced_at: ${SYNCED_AT}"
              echo "---"
              printf '%s\n' "$BODY"
            } > "/tmp/${f}.new"

            # Body-only diff so synced_at changes don't generate PRs — EXCEPT
            # when the existing header is aging toward the freshness gate, in
            # which case the header refreshes even with an unchanged body.
            if [ -f "$DEST" ]; then
              OLD_BODY=$(awk 'BEGIN{drop=1} /^---$/ && drop {drop=0; next} !drop' "$DEST")
              NEW_BODY="$BODY"
              if [ "$OLD_BODY" = "$NEW_BODY" ]; then
                old_synced=$(grep -E '^# synced_at:' "$DEST" | head -1 | sed -E 's/^# synced_at:[[:space:]]*//')
                old_seconds=$(date -u -d "$old_synced" +%s 2>/dev/null || echo 0)
                now_seconds=$(date -u +%s)
                age_days=$(( (now_seconds - old_seconds) / 86400 ))
                if [ "$old_seconds" != "0" ] && [ "$age_days" -lt "$REFRESH_AGE_DAYS" ]; then
                  echo "  -> body unchanged; synced_at ${age_days}d old (< ${REFRESH_AGE_DAYS}d); not rewriting"
                  continue
                fi
                echo "  -> body unchanged but synced_at is ${age_days}d old (or unparseable); refreshing header"
              fi
            fi

            mv "/tmp/${f}.new" "$DEST"
            changed_files+=("$f")
            echo "  -> updated $DEST"
          done

          if [ ${#changed_files[@]} -eq 0 ]; then
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
            printf '%s\n' "${changed_files[@]}" > /tmp/changed.txt
          fi
          if [ ${#skipped_files[@]} -ne 0 ]; then
            printf '%s\n' "${skipped_files[@]}" > /tmp/skipped.txt
            # Warn on every run, not just no-op ones: the summary step below is
            # gated on any_changed != true, so a partial sync that opened a PR
            # used to carry its gaps to master unmentioned.
            echo "::warning title=sync-brand-pack: files not retrieved::${skipped_files[*]} — in canon at ${SHA} but not fetched; the mirror is incomplete."
          fi

      - name: Open / update PR with changes
        if: steps.cfg.outputs.ok == 'true' && steps.fetch.outputs.any_changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.pr-token.outputs.token || secrets.GITHUB_TOKEN }}
          branch: sync/brand-pack
          commit-message: |
            chore(brand-pack): sync from skylight-hub@${{ steps.src.outputs.sha }}
          title: "chore: sync brand-pack from skylight-hub"
          body: |
            Automated sync of `_data/brand/*.yml` from
            `${{ env.SOURCE_REPO }}@${{ steps.src.outputs.branch }}`
            (`${{ steps.src.outputs.sha }}`).

            Review the diff to confirm the brand change is intentional. If
            the source change is wrong, fix it upstream — this PR will pick
            up the corrected version on the next sync.

            See [`_data/brand/README.md`](https://github.com/skylight-hq/skylight.digital/blob/master/_data/brand/README.md)
            for the sync convention.
          labels: |
            sync
            brand-pack

      - name: No-op summary
        if: steps.cfg.outputs.ok == 'true' && steps.fetch.outputs.any_changed != 'true'
        run: |
          echo "No diff in brand-pack content; nothing to PR."
          if [ -f /tmp/skipped.txt ]; then
            echo "Skipped (not retrievable from source):"
            cat /tmp/skipped.txt
          fi

      - name: Alert on failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="Scheduled run failed: sync-brand-pack"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --repo "${{ github.repository }}" --label ops-alert --state open --search "\"$title\" in:title" --json number --jq '.[0].number')
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" --body "Failed again: $run_url"
          else
            gh issue create --repo "${{ github.repository }}" --label ops-alert --title "$title" --body "The scheduled run failed: $run_url — investigate and re-run (workflow_dispatch). This issue collects repeat failures; close it when the job is green again."
          fi
