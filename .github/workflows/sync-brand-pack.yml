name: sync-brand-pack

# Keeps _data/brand/*.yml in sync with the canonical
# skylight-hub/plugins/skylight-brand-pack/config/*.yml. If contents diverge,
# opens a single PR with the changed files and refreshed sync headers. If
# nothing changed, the run is a no-op.
#
# Mirrors the sync-website-filters.yml pattern in skylight-hub, with the
# direction reversed (this repo fetches FROM hub instead of being fetched BY
# hub).
#
#   *** AUTH ***
#   skylight-hub is PRIVATE. The default GITHUB_TOKEN (scoped to this repo)
#   cannot read it, and unauthenticated raw.githubusercontent fetches 404.
#   So this sync fetches via the GitHub contents API using a short-lived token
#   minted from the federation GitHub App (Contents:Read, scoped to
#   skylight-hub, ~1h TTL) — no long-lived PAT. Until the App is configured
#   (FEDERATION_APP_CLIENT_ID variable + FEDERATION_APP_PRIVATE_KEY secret, App
#   installed on skylight-hq/skylight-hub), the sync SKIPS with a warning
#   (non-blocking) so the workflow stays mergeable and self-activates. The
#   same App config activates the case-study-lint gate.
#
#   NOTE: the companion brand-pack-freshness.yml job fails when a vendored
#   file's synced_at is >30 days old. If this sync stays inactive (no App),
#   the brand files will eventually trip that freshness gate — configuring the
#   App resolves both.

on:
  schedule:
    # Mondays at 14:00 UTC (~10am ET) — brand changes are quarterly at most;
    # weekly polling is overkill but matches the filters-pack cadence for
    # operator-familiarity.
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SOURCE_REPO: skylight-hq/skylight-hub
      DEST_DIR: _data/brand
      SOURCE_DIR: plugins/skylight-brand-pack/config
      FILES: colors.yml typography.yml logo-rules.yml voice-tone.yml brand-narrative.yml illustration.yml customer-brand-rules.yml icons.yml imagery.yml
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Mint a short-lived token from the federation GitHub App to read the
      # brand-pack canon out of the private skylight-hub repo. Guarded so the
      # sync self-skips until the App is configured.
      - name: Mint hub-read App token
        id: app-token
        if: ${{ vars.FEDERATION_APP_CLIENT_ID != '' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.FEDERATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.FEDERATION_APP_PRIVATE_KEY }}
          owner: skylight-hq
          repositories: skylight-hub

      - name: Detect hub-access token
        id: cfg
        env:
          HUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -n "$HUB_TOKEN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync inactive notice
        if: steps.cfg.outputs.ok != 'true'
        run: |
          echo "::warning title=sync-brand-pack inactive::skylight-hub is private; this sync needs the federation GitHub App configured (FEDERATION_APP_CLIENT_ID variable + FEDERATION_APP_PRIVATE_KEY secret, App installed on skylight-hq/skylight-hub) to fetch the brand-pack canon. Skipping (non-blocking) until then. The same App config activates the case-study-lint gate."
          echo "Sync skipped — see warning above."

      - name: Resolve source default branch + SHA
        if: steps.cfg.outputs.ok == 'true'
        id: src
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH=$(gh api repos/${SOURCE_REPO} --jq '.default_branch')
          SHA=$(gh api repos/${SOURCE_REPO}/branches/${BRANCH} --jq '.commit.sha')
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}"       >> "$GITHUB_OUTPUT"
          echo "Source: ${SOURCE_REPO}@${BRANCH} (${SHA})"

      - name: Fetch + rewrite each mirrored file
        if: steps.cfg.outputs.ok == 'true'
        id: fetch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -uo pipefail
          BRANCH="${{ steps.src.outputs.branch }}"
          SHA="${{ steps.src.outputs.sha }}"
          SYNCED_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          mkdir -p "$DEST_DIR"
          changed_files=()
          skipped_files=()
          for f in $FILES; do
            # Authenticated fetch via the contents API (works for private repos;
            # `Accept: ...raw` streams the file bytes). Pinned to the resolved SHA.
            echo "Fetching ${SOURCE_DIR}/${f} @ ${SHA}"
            if ! gh api "repos/${SOURCE_REPO}/contents/${SOURCE_DIR}/${f}?ref=${SHA}" \
                   -H "Accept: application/vnd.github.raw" > "/tmp/${f}.body" 2>/tmp/${f}.err; then
              echo "  -> not retrievable (missing on source, or token lacks access); skipping"
              skipped_files+=("$f")
              continue
            fi
            BODY=$(cat "/tmp/${f}.body")
            DEST="${DEST_DIR}/${f}"
            {
              echo "# This file is a mirror of skylight-hub/${SOURCE_DIR}/${f}."
              echo "# Synced via .github/workflows/sync-brand-pack.yml."
              echo "# Do not edit by hand — edits get clobbered on next sync."
              echo "# source_repo: ${SOURCE_REPO}"
              echo "# source_path: ${SOURCE_DIR}/${f}"
              echo "# source_branch: ${BRANCH}"
              echo "# source_sha: ${SHA}"
              echo "# synced_at: ${SYNCED_AT}"
              echo "---"
              printf '%s\n' "$BODY"
            } > "/tmp/${f}.new"

            # Body-only diff so synced_at changes don't generate PRs.
            if [ -f "$DEST" ]; then
              OLD_BODY=$(awk 'BEGIN{drop=1} /^---$/ && drop {drop=0; next} !drop' "$DEST")
              NEW_BODY="$BODY"
              if [ "$OLD_BODY" = "$NEW_BODY" ]; then
                echo "  -> body unchanged; not rewriting (preserves existing synced_at)"
                continue
              fi
            fi

            mv "/tmp/${f}.new" "$DEST"
            changed_files+=("$f")
            echo "  -> updated $DEST"
          done

          if [ ${#changed_files[@]} -eq 0 ]; then
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
            printf '%s\n' "${changed_files[@]}" > /tmp/changed.txt
          fi
          if [ ${#skipped_files[@]} -ne 0 ]; then
            printf '%s\n' "${skipped_files[@]}" > /tmp/skipped.txt
          fi

      - name: Open / update PR with changes
        if: steps.cfg.outputs.ok == 'true' && steps.fetch.outputs.any_changed == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync/brand-pack
          commit-message: |
            chore(brand-pack): sync from skylight-hub@${{ steps.src.outputs.sha }}
          title: "chore: sync brand-pack from skylight-hub"
          body: |
            Automated sync of `_data/brand/*.yml` from
            `${{ env.SOURCE_REPO }}@${{ steps.src.outputs.branch }}`
            (`${{ steps.src.outputs.sha }}`).

            Review the diff to confirm the brand change is intentional. If
            the source change is wrong, fix it upstream — this PR will pick
            up the corrected version on the next sync.

            See [`_data/brand/README.md`](https://github.com/skylight-hq/skylight.digital/blob/master/_data/brand/README.md)
            for the sync convention.
          labels: |
            sync
            brand-pack

      - name: No-op summary
        if: steps.cfg.outputs.ok == 'true' && steps.fetch.outputs.any_changed != 'true'
        run: |
          echo "No diff in brand-pack content; nothing to PR."
          if [ -f /tmp/skipped.txt ]; then
            echo "Skipped (not retrievable from source):"
            cat /tmp/skipped.txt
          fi
