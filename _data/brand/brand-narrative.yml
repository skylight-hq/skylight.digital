# Skylight brand narrative — canonical data.
#
# Source of truth: Skylight Brand Guidelines (Version 5), pp. 26–30.
# The website page (skylight.digital/pages/company/brand/writing/
# brand_narrative.md) faithfully mirrors that PDF.
#
# Fields marked "PDF-canon" carry prose lifted verbatim from the PDF/page;
# do not paraphrase on sync. Fields marked "internal-extension" are
# Skylight-derived for channel-writer convenience and are NOT in the PDF —
# treat as editorial, not as canon.

meta:
  schema_version: 2
  source_canon: "Skylight Brand Guidelines (Version 5), pp. 26–30"
  source_mirror: skylight.digital/pages/company/brand/writing/brand_narrative.md
  synced_at: "2026-05-28"
  # schema_version bumped from 1 to 2 in PR fixing prose-canon drift
  # (the v1 strings were paraphrases, not verbatim mirrors).

# -- Mission (PDF-canon) ------------------------------------------------------

mission:
  one_sentence: "Our mission is to make government work in a digital world."
  why: |
    Every day millions of people — from veterans to immigrants — depend on
    government services to fulfill their needs. But too often these
    services are delivered using outmoded policies, practices, and
    technologies.
  what: |
    We're public servants at heart who are driven to make government
    services work better using design and technology.
  how: |
    Thinking and being digital requires fundamental practice, culture, and
    technology change. And that means institutionalizing modern disciplines
    such as human-centered design and lean-agile engineering. Everything we
    offer is designed to accelerate this process of change within
    government.

# -- The Skylight difference --------------------------------------------------
#
# Six differentiators, presented as a single block of prose on the brand-
# narrative page. `long:` is PDF-canon (verbatim). `short:` is
# internal-extension — a channel-writer-friendly truncation derived from
# the canon sentence, not from the PDF.

difference:
  - id: most-talented
    short: "Most talented group of digital professionals in government contracting."  # internal-extension
    long: |
      We're the most-talented group of digital professionals within the
      government contracting industry.

  - id: public-servants
    short: "Public servants at heart."  # internal-extension
    long: |
      We're public servants at heart who understand and steward the
      critical missions of government.

  - id: government-and-commercial
    short: "Unique blend of government and commercial know-how."  # internal-extension
    long: |
      We bring a unique blend of government and commercial know-how to
      solving our customer's biggest digital challenges.

  - id: modern-ways
    short: "Pursue modern ways of working."  # internal-extension
    long: |
      We pursue modern ways of working. New trends and technologies are
      constantly on the horizon. We embrace — even pioneer — new
      developments, go deep to understand their viability and impact, and
      harness those with the greatest promise to the benefit of our
      customers.

  - id: capacity-building
    short: "Believe in capacity building."  # internal-extension
    long: |
      We believe in the importance of capacity building. Regardless of
      mission, all government agencies are now technology organizations,
      which means they need to master disciplines such as human-centered
      design. Everything about us is designed to help our customers achieve
      such mastery.

  - id: fairness-belonging-accessibility
    short: "Fairness, belonging, and accessibility."  # internal-extension
    long: |
      We strive to create an environment of fairness, belonging, and
      accessibility for everyone.

# -- Brand personality (PDF-canon) --------------------------------------------
#
# Five traits. `name` + `description` lifted verbatim from PDF/page.

personality:
  - id: mission-oriented
    name: Mission oriented
    description: |
      We're driven by a burning passion to create better outcomes for the
      public through great government digital services.

  - id: talented
    name: Talented
    description: |
      When you work with Skylight, you're engaging with experts who are
      the best at what they do, and always deliver results — even when
      the going gets tough.

  - id: modern
    name: Modern
    description: |
      Skylight possesses know-how in the latest, most-proven practices and
      technologies.

  - id: lighthearted
    name: Lighthearted
    description: "We're approachable and easy to work with."

  - id: welcoming
    name: Welcoming
    # Updated from the PDF's "diverse, equitable, and inclusive" wording to
    # Skylight's current umbrella ("fairness, belonging, and accessibility")
    # per the content-guide standard. Deliberate internal update, not verbatim PDF.
    description: |
      We strive to create an environment of fairness, belonging, and
      accessibility — welcoming to people of all identities and backgrounds.

# -- Sample messaging (PDF-canon) ---------------------------------------------
#
# Note: `longer_description` contains the Liquid placeholder
# `{{ site.state_count }}` to match the website page exactly. When this
# YAML is consumed by the Jekyll site, that placeholder resolves to the
# dynamic value. Consumers outside the website should treat it as a
# literal placeholder (the printed PDF shows "24").

sample_messaging:
  one_sentence_description: |
    Skylight is a digital consultancy using design and technology to help
    government agencies deliver better public services.
  longer_description: |
    Skylight is a digital consultancy using design and technology to help
    government agencies deliver better public services. Our talented team
    consists of former Presidential Innovation Fellows, founders of 18F,
    and members of the U.S. Digital Service. Our areas of expertise
    include human-centered design, lean-agile engineering, DevSecOps,
    cloud computing, open-source software, APIs, legacy modernization,
    data management, digital transformation, digital procurement, and
    training.

    We partner with different clients from across government, including
    the U.S. Air Force, Centers for Medicare & Medicaid Services, U.S.
    Department of Veterans Affairs, Connecticut Office of Early
    Childhood, and many others. Skylight is based out of sunny Sarasota,
    Florida, though we're a distributed and remote-friendly team spread
    across more than {{ site.state_count }} different states.

# -- Messaging by audience ----------------------------------------------------
#
# `prospective_employees` is PDF-canon (verbatim).
# `prospective_customers` is PDF-canon — the PDF says "See longer
# description under sample messaging" for this audience pool (which also
# covers prospective teaming partners, academia, media).
# `partners` and `public_audiences` are internal-extension — not in the
# PDF, retained as channel-writer convenience.

messaging:
  prospective_customers: |
    See longer description under sample_messaging.
    (Same audience pool also covers prospective teaming partners,
    academia, and media per the brand guidelines.)

  prospective_employees: |
    Skylight is more than a company. We represent a movement to reinvent
    how the government serves families, patients, veterans, immigrants,
    and many others in today's digital world. Everything about us — our
    structure, values, services, work, thoughts, and team — is designed
    with that purpose in mind.

    It's people like you — with talents in research, design, product,
    engineering, data, and more — who can make a difference. We've
    created an environment that empowers you to use your skills for
    public good, whether that's improving early childhood outcomes, or
    helping to improve the lives of veterans. You'll work alongside a
    team of extraordinarily talented people who strive to bring out the
    best in you and each other. You'll also be taken care of with a
    well-thought-out compensation and benefits package.

    We want you to be happy, fulfilled, and well-supported. We're still
    in startup mode, and our future is bright. We're doing impactful
    work, building an amazing team, and improving every day. Everyone is
    given the opportunity to shape the company in some way.

    We'd love for you to join us in creating something special.

  # internal-extension below — not in PDF
  partners: |
    Skylight partners with organizations across government services
    delivery — system integrators, design firms, research shops, civic-tech
    coalitions. We bring digital-service practice expertise; partners
    bring sector depth or specialized capability. Engagements range from
    single-workstream collaborations to multi-year delivery teams.

  public_audiences: |
    Skylight is a digital services firm that works exclusively in
    government. We help agencies deliver better services to the public
    using the same modern practices found in the best private-sector
    technology companies — adapted for the realities of government.

# -- Three-companies framing --------------------------------------------------
#
# `three_companies` is PDF-canon. `reading:` is internal-extension —
# editorial gloss for channel writers, not in the PDF.

analogy:
  three_companies: "Google + McKinsey + ReadySet"
  intro: "If Skylight were the combination of three companies, we'd be..."
  reading: |
    Engineering depth (Google) + strategic-advisory experience (McKinsey)
    + government-services credibility (ReadySet). The combination is the
    point — neither pure tech firm nor pure consultancy nor pure gov-services
    shop.

# -- Renderer output ----------------------------------------------------------

output:
  view: ../views/brand-narrative.md
  template: brand_narrative
