# -- Illustration palettes ----------------------------------------------------
#
# Referenced by illustration.yml's visual_style.primary_colors.palette_ref and
# visual_style.skin_and_hair.palette_ref. Those rules pointed here from the
# 2026-05 extraction; the swatches themselves were never lifted, leaving the
# refs dangling until 2026-07-14.

# The bright colors approved for illustration. A SELECTION of existing ramp
# tokens, not new colors — every value below is identical to its ramp entry
# above, verified 2026-07-14. Kept as tokens so it cannot drift from the ramps.
# Rule (illustration.yml): one bright primary per illustration; outlines black;
# light gray minimally as needed.
primary_illustration:
  - { token: blue-100,   value: 468fba }
  - { token: green-100,  value: 80b690 }
  - { token: red-100,    value: df635c }
  - { token: ochre-100,  value: f4c55c }
  - { token: gray-100,   value: 54565a }
  - { token: gray-20,    value: ddddde }

# Skin and hair tones for illustrating people. Token-less by design: these are
# a base set to start from, and the guideline explicitly allows adjusting them
# for contrast within an illustration — so they are not fixed brand tokens the
# way the ramps are. Ordering is the published order.
# Rule (illustration.yml): use as needed to reflect the full range of people in
# the world around us.
skin:
  - { value: edc3a2 }
  - { value: ebb18b }
  - { value: e29871 }
  - { value: de885a }
  - { value: f0a871 }
  - { value: e6a96c }
  - { value: d08d53 }
  - { value: ce8762 }
  - { value: b9663b }
  - { value: ab592f }
  - { value: 9c4e30 }
  - { value: e99821 }
  - { value: 54565a }
  - { value: 5c5247 }

# -- Allowed-color set for linter rules ---------------------------------------
