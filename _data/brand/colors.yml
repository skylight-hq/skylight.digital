# Skylight brand colors — canonical data.
#
# Mirrors skylight.digital/_data/color.yml. The website's brand-identity
# page (pages/company/brand/identity/colors.md) already renders from
# its local copy of this data; this file is the federation-wide canon
# that channel-writer plugins, linters, and the eventual MCP server
# consume.
#
# Sync convention: vendored copy. See `meta.source_*` below. The
# website's local copy may lag this file briefly during a brand
# update — Phase 7 of the brand-guidelines migration plan (in
# follow-up) wires up a periodic PR-based sync workflow.
#
# Color meanings sourced from skylight.digital/pages/company/brand/
# identity/colors.md and the Skylight Brand Guidelines (Version 5).

meta:
  schema_version: 1
  source_repo: skylight-hq/skylight.digital
  source_path: _data/color.yml
  source_branch: master
  synced_at: "2026-05-23T00:00:00Z"
  source_migration: skylight-hub/migrations/archive/2026-05-23-brand-guidelines.md

# -- Color meanings -----------------------------------------------------------
#
# Each primary color carries a brand meaning that channel writers can
# query when deciding which color anchors a specific surface.

meanings:
  blue:   "sky, wisdom, dependable, committed"
  green:  "nature, balance, growth, compassion"
  ochre:  "sun/light, optimism, creativity, clarity"
  red:    "energy, passion, authority, confidence"
  gray:   "neutral; primary text + chart color"

# -- Tints (full scale per family) --------------------------------------------
#
# Each family carries a tint scale. Token names match the production
# CSS class names on skylight.digital (`.bg-blue-100`, `.bg-ochre-40`,
# etc.). Hex values are exact; no rounding.

