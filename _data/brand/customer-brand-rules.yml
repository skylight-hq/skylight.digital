# Customer brand handling — meta rules + per-client status registry.
#
# The Skylight Brand Guidelines (Version 5) appendices carry ~30-40 pages
# of brand specifics per customer/partner — DoD, USAF, CMS, VA, CDC, and
# others. Per-client packs live in their respective per-client marketplaces
# (skylight-hub-<client>); this file in the hub-resident brand-pack holds
# only the *meta* rules for handling customer brand + a registry of
# per-client extraction status.
#
# Per-client appendix extraction is a follow-up backlog tracked as one
# migration per client. The first per-client extraction becomes the
# template for the rest.

meta:
  schema_version: 1
  source: "Skylight Brand Guidelines (Version 5), Appendices section"
  synced_at: "2026-05-23"

# -- Meta rules for customer brand handling -----------------------------------

meta_rules:

  - id: defer-to-client-brand
    rule: |
      When producing artifacts that ship under a customer's brand, defer
      to the customer's brand guidelines. Skylight branding appears only
      where Skylight is named as a vendor / partner / source.
    examples:
      - "USAF-branded landing pages → USAF brand applies; Skylight credit is a small footer."
      - "CDC research-summary deliverable → CDC brand applies; Skylight authored-by-line."

  - id: co-branding-allowed
    rule: |
      Co-branding (Skylight logo + customer logo side-by-side) is
      acceptable on:
        - Case studies on skylight.digital (Skylight-owned surface)
        - Joint announcements where both parties have approved the framing
        - Trade-show booths / event presence where Skylight is named as a
          named partner
    not_allowed: |
      Co-branding is NOT acceptable on customer-owned surfaces (customer
      websites, customer-branded deliverables) without explicit written
      approval from the customer's brand owner.

  - id: trademarks-honored
    rule: |
      All customer trademarks (™, ®) are honored on first mention. If a
      customer's brand guide specifies particular trademark indicators
      on subsequent mentions, follow that.

  - id: escalation-path
    rule: |
      When customer brand requirements conflict with Skylight brand
      requirements (e.g., customer requires unauthorized colors), escalate
      to the engagement lead + Skylight brand lead before producing the
      artifact. Document the resolution in the engagement's brand-decisions
      log.

