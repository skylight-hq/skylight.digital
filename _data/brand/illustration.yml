# -- Six core illustration principles (PDF-canon) -----------------------------
#
# Names + descriptions verbatim from PDF p. 34.

principles:
  - id: highlight-impact
    name: Highlight impact
    description: |
      Demonstrate the impact of our mission and the work that we do. We
      want people to understand why working with us benefits them and
      society.

  - id: humanize
    name: Humanize
    description: |
      People are at the center of our work. Embody this by incorporating
      human elements such as a person's full body, face, or hands.

      Typically, illustrations with objects only are reserved for icons.

  - id: digitize
    name: Digitize
    description: |
      Show people interacting with technology, or in visual metaphors
      about the physical and digital world intersecting.

      In some cases, it might be more compelling to focus on the ultimate
      outcomes of our work rather than the technology or methods that we
      use.

  - id: simplify
    name: Simplify
    description: |
      As a company, we aim to turn complex problems into the simplest
      solutions possible. Employ metaphors to translate the complexity of
      the problem and solution spaces in which we operate into widely
      understandable visuals. Because this method tends to be more
      accessible and memorable, avoid literal drawings.

  - id: represent-everyone
    name: Represent everyone
    description: |
      Reflect the full range of people in the world that we live in — skin
      colors, body types, facial features (such as hair), age, abilities,
      style (such as clothing).

  - id: contextualize
    name: Contextualize
    description: |
      Keep in mind the purpose that the illustration is intended to serve.

      For example, if the illustration will accompany a case study or blog
      post, reinforce what we're trying to accomplish within the text —
      that is, what we're trying to communicate to the target audience.

# -- Visual style (PDF-canon) -------------------------------------------------
#
# Structured to match the website page's section breakdown:
# Palette → Primary colors → Skin and hair → General guidance → Graphic
# elements. Prose lifted verbatim.

visual_style:
  palette:
    intro: |
      To create unity and cohesion within the brand, we use color in a
      specific way. The limited color palette, combined with the offset
      outlines, creates a sophisticated, lighthearted, and positive tone.

  primary_colors:
    rule: |
      Choose one bright primary color per illustration. Outlines should
      be black. Use light gray minimally as needed.
    palette_ref: ../config/colors.yml  # primary_illustration block

  skin_and_hair:
    rule: |
      Use skin and hair colors as needed to reflect the full range of people
      in the world around us. These colors serve as a base to get started —
      they can get adjusted slightly to ensure contrast with the other
      colors in the illustration.
    palette_ref: ../config/colors.yml  # skin block

  general_guidance:
    intro: |
      To maintain consistency our illustrations use color, lines, and
      fills in a similar way:
    rules:
      - "Use hair and skin colors, as needed, to represent the full range of people in the world"
      - "Create texture with patterns to add personality to the images"
      - "Accent minimally with light gray"
      - "Craft illustrations using offset outlines with selected fills"
      - "Reflect real life with organizational clothing (such as military uniforms), an exception to the limited palette"

  graphic_elements:
    intro: |
      Geometric shapes (circle, triangle, square) are recurring graphic
      elements used in both layout design and illustration. Consider the
      following rules when using these elements:
    rules:
      - "Always outline"
      - "Rotate and scale as needed"
      - "Direct focus to important copy (but don't overpower it)"
      - "Anchor to illustration vignette when possible"
      - "Add texture to negative space"

# -- Illustration types (PDF-canon + page-canon) ------------------------------
#
# Five types, lifted from the website's illustration_types.md (which
# matches PDF pp. 38–39 for the first two and extends to Heroes and
# Portraits per the page). Each `description:` is verbatim from the
# corresponding page section.

types:
  - id: featured-post
    name: Featured post illustrations
    description: |
      Illustrations for posts, such as a case study or blog article, use
      one or two (three if absolutely needed) bright colors from the
      illustration palette.

      These images are always full bleed with a background color.

  - id: floating-monochromatic
    name: "Floating illustrations: monochromatic"
    description: |
      Floating images don't have borders or any background color.

      They're monochromatic using a bold color from the illustration
      palette. Accent with `gray-100` and sparingly with light gray.

  - id: floating-rotate-colors
    name: "Floating illustrations: rotate colors"
    description: |
      Even though illustrations are monochromatic, pages or layouts with
      many floating images should rotate through the different primary
      Skylight colors.

      These images are used primarily within pages on the website.

  - id: heroes
    name: Heroes
    description: |
      Hero banners are monochromatic.

      The base color uses a primary color and the rest of the
      illustration uses lighter or darker shades. Each section of the
      website uses one color.

      Hero banners are made of 2–4 illustration vignettes and the
      geometric shapes. The shapes are anchored to the vignettes and
      sprinkled throughout the layout to drive focus to the text.

  - id: portraits
    name: Portraits
    description: |
      Portraits use 1–2 primary colors, as well as any skin and hair
      color needed.

      These images are always full bleed with a background color.

# -- Renderer output ----------------------------------------------------------

output:
  view: ../views/illustration.md
  template: brand_illustration
