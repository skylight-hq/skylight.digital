# Skylight brand typography — canonical data.
#
# Source of truth: Skylight Brand Guidelines (Version 5), p. 19 — typeface
# names + 5 Libre Franklin weights (Bold 700 / SemiBold 600 / Medium 500 /
# Regular 400 / Light 300) and Roboto Mono Regular 400. The website page
# (skylight.digital/pages/company/brand/identity/typography.md) faithfully
# mirrors that PDF.
#
# Fields below carry inline annotations: PDF-canon (verbatim) vs
# internal-extension (Skylight-derived, not in PDF). Channel-writer
# consumers should treat internal-extension fields as editorial guidance,
# not as canon.

meta:
  schema_version: 2
  source_canon: "Skylight Brand Guidelines (Version 5), p. 19"
  source_mirror: skylight.digital/pages/company/brand/identity/typography.md
  synced_at: "2026-05-28"
  # schema_version bumped from 1 to 2 in PR annotating canon vs
  # internal-extension fields (scale, fallback_stack, license, use_for
  # were all internal — labeling makes consumers aware).

# -- Type families ------------------------------------------------------------
#
# PDF-canon (verbatim from p. 19):
#   - `name`, `role`, `weights[]` (weight number + name), `italics[]`
# INTERNAL-EXTENSION (Skylight-derived, not in PDF):
#   - `source` (Google Fonts URL), `license`, `fallback_stack`, `use_for`

families:

  primary:
    name: Libre Franklin
    role: Primary brand typeface
    source: https://fonts.google.com/specimen/Libre+Franklin  # internal-extension
    license: SIL Open Font License 1.1  # internal-extension
    fallback_stack: |  # internal-extension
      "Libre Franklin", "Helvetica Neue", Arial, sans-serif
    weights:
      - { weight: 300, name: Light }
      - { weight: 400, name: Regular }
      - { weight: 500, name: Medium }
      - { weight: 600, name: SemiBold }
      - { weight: 700, name: Bold }
    italics:
      - { weight: 300, name: "Light Italic" }  # PDF p. 19 shows italic in
                                               # the "vast and endless sea"
                                               # specimen line
    use_for:  # internal-extension
      - Headings (all levels)
      - Body copy
      - UI text
      - Captions

  monospace:
    name: Roboto Mono
    role: Complementary mono typeface
    source: https://fonts.google.com/specimen/Roboto+Mono  # internal-extension
    license: Apache License 2.0  # internal-extension
    fallback_stack: |  # internal-extension
      "Roboto Mono", Menlo, Monaco, "Courier New", monospace
    weights:
      - { weight: 400, name: Regular }
    use_for:  # internal-extension
      - Code samples
      - Attribution / metadata lines
      - Technical specs

# -- Scale recommendations ----------------------------------------------------
#
# INTERNAL-EXTENSION (not in PDF): the PDF does not publish a type scale
# table. Values below are my rough mapping of skylight.digital's current
# CSS rendering — useful as channel-writer reference but NOT canon.
# Treat as informational only; the production CSS in skylight.digital is
# the actual source of truth for site type sizes.

scale:
  display:    { rem: 4.0, weight: 500, line_height: 1.1 }
  heading_1:  { rem: 2.6, weight: 500, line_height: 1.2 }
  heading_2:  { rem: 2.15, weight: 600, line_height: 1.25 }
  heading_3:  { rem: 1.7, weight: 700, line_height: 1.3 }
  body:       { rem: 1.0, weight: 400, line_height: 1.6 }
  small:      { rem: 0.875, weight: 400, line_height: 1.5 }
  kicker:     { rem: 1.0, weight: 400, line_height: 1.4, transform: uppercase, tracking: 0.05 }

# -- Acquisition --------------------------------------------------------------
#
# Both fonts are open-licensed and available from Google Fonts. No
# font binaries are committed to this repo; the website loads them
# from the Google Fonts CDN at build time. See assets/fonts/README.md
# for details.

acquisition:
  primary:
    - "Google Fonts: https://fonts.google.com/specimen/Libre+Franklin"
  monospace:
    - "Google Fonts: https://fonts.google.com/specimen/Roboto+Mono"
  notes: |
    Skylight does NOT commit licensed font binaries to any repo. Both
    Libre Franklin and Roboto Mono are open-licensed (OFL 1.1 and
    Apache 2.0 respectively) but the canonical acquisition path is
    Google Fonts. The website CSS loads them via the Google Fonts API.

# -- Renderer output ----------------------------------------------------------

output:
  view: ../views/typography.md
  template: brand_typography
