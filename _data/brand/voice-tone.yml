# Skylight voice + tone qualities — canonical data.
#
# This file lists *what* the voice qualities are (5 names + one-line
# descriptions). The Skylight Content Guide carries the *examples* of
# each in practice.
#
# Decision committed: brand-pack lists qualities; content-guide has
# examples. Cross-linked, no duplication.
#
# Source of truth: Skylight Brand Guidelines (Version 5), p. 31 names
# the 5 qualities; the Content Guide (skylight-hub/standards/
# content-guide.md §Voice qualities) carries the one-line descriptions
# verbatim from there. Both are PDF-blessed canon.

meta:
  schema_version: 2
  source_canon:
    - "Skylight Brand Guidelines (Version 5), p. 31 — quality names"
    - "skylight-hub/standards/content-guide.md §Voice qualities — one-line descriptions"
  source_mirror: skylight.digital/pages/company/brand/writing/voice_and_tone.md
  synced_at: "2026-05-28"
  examples_in: skylight-hub/standards/content-guide.md
  examples_rendered_at: https://skylight.digital/work/toolkits/content-guide/voice-and-tone/
  # schema_version bumped from 1 to 2 in PR fixing voice-quality one-liners
  # (v1 one_line values were paraphrases I drafted; v2 lifts them verbatim
  # from the content guide, which is itself PDF-blessed canon).

# -- Voice qualities (constant — same across audiences) -----------------------
#
# All five `one_line:` strings are verbatim from the Content Guide's
# voice-quality section intros. Do not paraphrase on sync — if the
# Content Guide updates, mirror the change here.

voice_qualities:
  - id: expressive
    name: Expressive
    one_line: |
      We use simple words and phrases to convey profound thoughts and big
      feelings.

  - id: smart
    name: Smart
    one_line: |
      We bring unique knowledge and insights to the conversation.

  - id: lighthearted
    name: Lighthearted
    one_line: |
      The world is tough. The work we do is tough. We don't take ourselves
      too seriously, and we're easy to work with.

  - id: embracing
    name: Embracing
    one_line: |
      Whoever you are, we're your biggest supporter.

  - id: worldly
    name: Worldly
    one_line: |
      We're interested, knowledgeable, and always learning. We have a broad
      worldview, but we're not know-it-alls.

# -- Tone modulation (varies by audience) -------------------------------------
#
# INTERNAL-EXTENSION (not in PDF): tone axes + values below are
# Skylight-internal scaffolding for channel writers. The PDF says only
# "modulate tone based on audience" and points to the Content Guide for
# examples. The axes/values here are useful editorial structure, retained.

tone_axes:
  - id: audience-formality
    name: Audience formality
    values:
      casual:     "Slack channel, internal newsletter, recruiting Tweet"
      neutral:    "Public LinkedIn post, blog post, case study"
      formal:     "Contract response, executive summary, congressional report"

  - id: emotional-stakes
    name: Emotional stakes
    values:
      celebratory:  "Contract win, milestone, partner-highlight, new hire"
      informative:  "News, evergreen, methodology post"
      somber:       "Memorial, retraction, post-incident learning"

