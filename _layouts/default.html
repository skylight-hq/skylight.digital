<!DOCTYPE html>
<html lang="en">

  {% include head.html %}

  <body class="page-{% if page.class %}{{ page.class }}{% else %}{{ page.title | slugify }}{% endif %} {% if layout.class %}page-{{ layout.class }}{% endif %} page-{{ page.permalink | slugify }} page-{{ page.url | replace:'/',' ' | truncatewords: 1 | remove:'...' }} {% if page.toolkit_name == "brand" %}page--{{ page.sidenav | slugify }}{% endif %}" data-spy="scroll" data-target="#sidenav" data-offset="10">
    <a href="#content" class="sr-only sr-only-focusable">Skip to main content</a>

    {% include header.html %}

    <main id="content" tabindex="-1">
      {{content}}
    </main>
    <div id="race-bar-graph"></div>
    <svg> 
      <circle class="target" style="fill: #69b3a2" stroke="black" cx=50 cy=50 r=40></circle>
    </svg>

    <!-- DE&I DATA VIZ POC STARTS HERE -->
    <script>
      var margin = {top: 20, right: 30, bottom: 40, left: 90},
          width = 600 - margin.left - margin.right,
          height = 300 - margin.top - margin.bottom;
      // append the svg object to the body of the page
      var svg = d3.select("#race-bar-graph")
        .append("svg")
          .attr("width", width)
          .attr("height", height)
        .append("g")
          .attr("transform",
                "translate(" + margin.left + "," + margin.top + ")")
      console.log('hello');
      (async function() {
        try {
          const data = await d3.json("/data/circle.json")
          const strokeWidth = data.width
          let labels = [];
          data.data.forEach(data => {
            labels.push(data.race)
          });
          console.log('labels', labels)
          console.log('data', data)
          d3.select(".target").style("stroke-width", strokeWidth);

          var x = d3.scaleLinear()
            .domain([0, 100]) //x
            .range([ 0, 100]); //y
          svg.append("g")
            .attr("transform", "translate(0," + height + ")")
            .call(d3.axisBottom(x))
            .selectAll("text")
              .attr("transform", "translate(-10,0)rotate(-45)")
              .style("text-anchor", "end");

          var y = d3.scaleBand()
            .range([ 0, height ])
            .domain(data.data.map(function(d) { return d.race; }))
            .padding(.1);
          svg.append("g")
            .call(d3.axisLeft(y))
          svg.selectAll('rect .background')
            .data(data.data)
            .enter()
            .append('rect')
            .classed('background', true)
            .attr('y', function (d) { return y(d.race); })
            .attr('x', x(0))
            .attr('height', 87)
            .attr('width', function (d) { return x(340); })
            .attr('fill', '#DAE9F1')
          svg.selectAll("myRect")
            .data(data.data)
            .enter()
            .append("rect")
            .style("margin-top", "10px")
            .attr("x", x(0) )
            .attr("y", function(d) { return y(d.race); })
            .attr("width", function(d) { return x(d.percent*340/100); })
            .attr("height", 87)
            .attr("fill", "#468FBA")
          // This is not working currently. Trying to add text to bar graph.
          svg.selectAll('text')
            .data(labels)
            .enter()
            .append('text')
            .text(function (d) { return d; })
            .attr('y', 100)
            .attr('x', 5)
            .attr('font-family', 'sans-serif')
            .attr('font-size', '13px')
            .attr('font-weight', 900)
            .attr('fill', 'black');
        } catch(error) {
          console.log(error);
        }
      })();
    </script>
    <!-- DE&I DATA VIZ POC ENDS HERE -->
    <!-- https://codepen.io/anon/pen/JnlAE?editors=1010 -->

    {% include footer.html %}

    {% include analytics.html %}
  </body>

</html>
